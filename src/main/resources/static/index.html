<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent3: #6affcc;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --high: #ff6a6a;
    --medium: #ffb86a;
    --low: #6affcc;
    --pending: #7c6aff;
    --inprogress: #ffb86a;
    --done: #6affcc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
  }
  .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation: drift1 12s ease-in-out infinite; }
  .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -50px; right: -50px; animation: drift2 15s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.4rem;
    letter-spacing: -1px;
    line-height: 1;
  }
  .logo span { color: var(--accent); }
  .logo-sub {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .stats {
    display: flex;
    gap: 20px;
    text-align: right;
  }
  .stat-item { display: flex; flex-direction: column; align-items: flex-end; }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  /* Add Task Button */
  .add-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 1px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .add-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,255,0.05);
  }
  .add-btn .plus { font-size: 1.2rem; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 480px;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s;
    position: relative;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-title .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
  }

  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .modal-actions { display: flex; gap: 12px; margin-top: 28px; }
  .btn-cancel {
    flex: 1; padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-save {
    flex: 2; padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-save:hover { background: #9080ff; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(124,106,255,0.3); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 12px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 16px;
    transition: all 0.25s;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .task-card.priority-high::before { background: var(--high); }
  .task-card.priority-medium::before { background: var(--medium); }
  .task-card.priority-low::before { background: var(--low); }

  .task-card:hover {
    border-color: rgba(124,106,255,0.3);
    background: var(--surface2);
    transform: translateX(3px);
  }

  .task-id {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    min-width: 32px;
  }

  .task-info { min-width: 0; }
  .task-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-badges { display: flex; gap: 8px; }

  .badge {
    font-size: 0.6rem;
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .badge-status-pending { background: rgba(124,106,255,0.15); color: var(--pending); border: 1px solid rgba(124,106,255,0.2); }
  .badge-status-in-progress { background: rgba(255,184,106,0.15); color: var(--inprogress); border: 1px solid rgba(255,184,106,0.2); }
  .badge-status-done { background: rgba(106,255,204,0.15); color: var(--done); border: 1px solid rgba(106,255,204,0.2); }
  .badge-priority-high { background: rgba(255,106,106,0.1); color: var(--high); }
  .badge-priority-medium { background: rgba(255,184,106,0.1); color: var(--medium); }
  .badge-priority-low { background: rgba(106,255,204,0.1); color: var(--low); }

  .task-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    transition: all 0.2s;
    color: var(--text-muted);
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,255,0.1); }
  .icon-btn.del:hover { border-color: var(--high); color: var(--high); background: rgba(255,106,106,0.1); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    display: none;
  }
  .empty-state.show { display: block; }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
  .empty-text { font-size: 0.85rem; letter-spacing: 1px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 12px 24px;
    font-size: 0.8rem;
    letter-spacing: 1px;
    z-index: 200;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--done); color: var(--done); }
  .toast.error { border-color: var(--high); color: var(--high); }

  /* Loading spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px;
    color: var(--text-muted);
    font-size: 0.8rem;
    letter-spacing: 2px;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }

  /* Divider */
  .section-label {
    font-size: 0.62rem;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.6s 0.15s ease both;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  @media (max-width: 600px) {
    .logo { font-size: 1.8rem; }
    .stats { display: none; }
    .task-card { grid-template-columns: 1fr auto; }
    .task-id { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div>
      <div class="logo">Task<span>Flow</span></div>
      <div class="logo-sub">Task Manager — REST API</div>
    </div>
    <div class="stats">
      <div class="stat-item">
        <div class="stat-num" id="stat-total" style="color:var(--accent)">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-pending" style="color:var(--pending)">—</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-done" style="color:var(--done)">—</div>
        <div class="stat-label">Done</div>
      </div>
    </div>
  </header>

  <!-- Add Task Button -->
  <button class="add-btn" onclick="openModal()">
    <span class="plus">＋</span> ADD NEW TASK
  </button>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">ALL</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">PENDING</button>
    <button class="filter-btn" onclick="setFilter('in-progress', this)">IN PROGRESS</button>
    <button class="filter-btn" onclick="setFilter('done', this)">DONE</button>
    <button class="filter-btn" onclick="setFilter('high', this)">🔴 HIGH</button>
    <button class="filter-btn" onclick="setFilter('medium', this)">🟡 MEDIUM</button>
    <button class="filter-btn" onclick="setFilter('low', this)">🟢 LOW</button>
  </div>

  <!-- Section Label -->
  <div class="section-label">Tasks</div>

  <!-- Task List -->
  <div class="task-list" id="task-list">
    <div class="loading-row"><div class="spinner"></div> LOADING TASKS...</div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">📭</div>
    <div class="empty-text">NO TASKS FOUND</div>
  </div>

</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <div class="dot"></div>
      <span id="modal-title-text">NEW TASK</span>
    </div>

    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="input-title" placeholder="What needs to be done?"/>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="input-status">
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="input-priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-save" onclick="saveTask()" id="save-btn">SAVE TASK</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = '';
  let allTasks = [];
  let editingId = null;
  let currentFilter = 'all';

  // ─── API CALLS ───────────────────────────────────────────
  async function fetchTasks() {
    try {
      const res = await fetch(`${API}/tasks`);
      allTasks = await res.json();
      updateStats();
      renderTasks();
    } catch(e) {
      document.getElementById('task-list').innerHTML = `
        <div class="loading-row" style="color:var(--high)">
          ⚠ Cannot connect to API — is Spring Boot running on port 8080?
        </div>`;
    }
  }

  async function createTask(task) {
    const res = await fetch(`${API}/task`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(task)
    });
    return res.ok;
  }

  async function updateTask(id, task) {
    const res = await fetch(`${API}/task/${id}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(task)
    });
    return res.ok;
  }

  async function deleteTask(id) {
    const res = await fetch(`${API}/task/${id}`, { method: 'DELETE' });
    return res.ok;
  }

  // ─── RENDER ─────────────────────────────────────────────
  function renderTasks() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-state');

    let tasks = allTasks;
    if (currentFilter === 'pending')     tasks = tasks.filter(t => t.status === 'pending');
    if (currentFilter === 'in-progress') tasks = tasks.filter(t => t.status === 'in-progress');
    if (currentFilter === 'done')        tasks = tasks.filter(t => t.status === 'done');
    if (currentFilter === 'high')        tasks = tasks.filter(t => t.priority === 'high');
    if (currentFilter === 'medium')      tasks = tasks.filter(t => t.priority === 'medium');
    if (currentFilter === 'low')         tasks = tasks.filter(t => t.priority === 'low');

    if (tasks.length === 0) {
      list.innerHTML = '';
      empty.classList.add('show');
      return;
    }
    empty.classList.remove('show');

    list.innerHTML = tasks.map((t, i) => `
      <div class="task-card priority-${t.priority}" style="animation-delay:${i*0.05}s">
        <div class="task-id">#${t.id}</div>
        <div class="task-info">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-badges">
            <span class="badge badge-status-${t.status}">${t.status}</span>
            <span class="badge badge-priority-${t.priority}">${t.priority}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="openEdit(${t.id})" title="Edit">✏️</button>
          <button class="icon-btn del" onclick="confirmDelete(${t.id})" title="Delete">🗑</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allTasks.length;
    document.getElementById('stat-pending').textContent = allTasks.filter(t => t.status === 'pending').length;
    document.getElementById('stat-done').textContent = allTasks.filter(t => t.status === 'done').length;
  }

  // ─── MODAL ──────────────────────────────────────────────
  function openModal() {
    editingId = null;
    document.getElementById('modal-title-text').textContent = 'NEW TASK';
    document.getElementById('input-title').value = '';
    document.getElementById('input-status').value = 'pending';
    document.getElementById('input-priority').value = 'medium';
    document.getElementById('save-btn').textContent = 'SAVE TASK';
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('input-title').focus(), 200);
  }

  function openEdit(id) {
    const task = allTasks.find(t => t.id === id);
    if (!task) return;
    editingId = id;
    document.getElementById('modal-title-text').textContent = 'EDIT TASK';
    document.getElementById('input-title').value = task.title;
    document.getElementById('input-status').value = task.status;
    document.getElementById('input-priority').value = task.priority;
    document.getElementById('save-btn').textContent = 'UPDATE TASK';
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('input-title').focus(), 200);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  async function saveTask() {
    const title = document.getElementById('input-title').value.trim();
    if (!title) { showToast('⚠ Title cannot be empty', 'error'); return; }

    const task = {
      title,
      status: document.getElementById('input-status').value,
      priority: document.getElementById('input-priority').value
    };

    const btn = document.getElementById('save-btn');
    btn.textContent = 'SAVING...';
    btn.disabled = true;

    let ok;
    if (editingId) {
      ok = await updateTask(editingId, task);
    } else {
      ok = await createTask(task);
    }

    btn.disabled = false;
    if (ok) {
      closeModal();
      showToast(editingId ? '✅ Task updated!' : '✅ Task created!', 'success');
      await fetchTasks();
    } else {
      btn.textContent = editingId ? 'UPDATE TASK' : 'SAVE TASK';
      showToast('❌ Something went wrong', 'error');
    }
  }

  async function confirmDelete(id) {
    const task = allTasks.find(t => t.id === id);
    if (!confirm(`Delete "${task?.title}"?`)) return;
    const ok = await deleteTask(id);
    if (ok) {
      showToast('🗑 Task deleted', 'success');
      await fetchTasks();
    } else {
      showToast('❌ Delete failed', 'error');
    }
  }

  // ─── FILTER ─────────────────────────────────────────────
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  // ─── TOAST ──────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ─── UTILS ──────────────────────────────────────────────
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Enter key in modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) saveTask();
  });

  // ─── INIT ────────────────────────────────────────────────
  fetchTasks();
</script>
</body>
</html>
